{% extends "base.html" %}

{% block title %}Báo cáo học phí{% endblock %}

{% block content %}
<div class="card-modern">
    <div class="card-header-modern">
        <span>Báo cáo học phí</span>
    </div>
    <div class="card-body-modern">
        <div class="row">
            <div class="col-12 col-md-6">
                <div class="mb-3">
                    <label class="form-label">Chọn lớp để xem báo cáo</label>
                    <select id="lopSelect" class="form-modern">
                        <option value="">-- Chọn lớp --</option>
                        {% for lop in lop_list %}
                        <option value="{{ lop.id }}">{{ lop.ten_lop }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button id="btnXemBaoCao" class="btn-modern btn-modern-primary" disabled>Xem báo cáo</button>
                <button id="btnXuatExcel" class="btn-modern btn-modern-outline" style="margin-left: 10px;" disabled>Xuất Excel</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/baocao.js') }}"></script>
{% endblock %}
