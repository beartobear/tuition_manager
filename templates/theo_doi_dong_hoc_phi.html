{% extends "base.html" %}

{% block title %}Theo dõi đóng học phí{% endblock %}

{% block content %}
<div class="card-modern">
    <div class="card-header-modern">
        <span>Theo dõi đóng học phí theo tháng</span>
    </div>
    <div class="card-body-modern">
        <div class="row">
            <div class="col-12 col-md-4 mb-4">
                <div class="mb-3">
                    <label class="form-label">Chọn lớp</label>
                    <select id="lopSelect" class="form-modern">
                        <option value="">-- Chọn lớp --</option>
                        {% for lop in lop_list %}
                        <option value="{{ lop.id }}">{{ lop.ten_lop }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tháng</label>
                    <select id="thangSelect" class="form-modern">
                        {% for i in range(1,13) %}
                        <option value="{{ i }}" {% if i == now().month %}selected{% endif %}>Tháng {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Năm</label>
                    <select id="namSelect" class="form-modern">
                        {% for i in range(2020,2031) %}
                        <option value="{{ i }}" {% if i == now().year %}selected{% endif %}>{{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button id="btnXem" class="btn-modern btn-modern-primary">Xem</button>
            </div>
            <div class="col-12 col-md-8">
                <div id="ketQua" style="display:none;">
                    <h5>Danh sách sinh viên</h5>
                    <div class="table-responsive">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th>Mã SV</th>
                                    <th>Họ tên</th>
                                    <th>Số tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày đóng</th>
                                    <th>Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody id="bangKetQua"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/theodoidong.js') }}"></script>
{% endblock %}
